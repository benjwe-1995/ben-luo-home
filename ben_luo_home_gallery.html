<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ben & Luo's Home</title><style>
:root{--bg:#f4efe7;--paper:#fffaf2;--ink:#2f2922;--muted:#776b5f;--line:#e3d7c8;--wood-dark:#6f4b35;--shadow:0 18px 50px rgba(47,41,34,.14)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top left,#fff8ed 0,#f4efe7 42%,#ece1d2 100%);color:var(--ink)}.hero{padding:54px 24px 28px;max-width:1220px;margin:auto}.kicker{letter-spacing:.18em;text-transform:uppercase;color:var(--wood-dark);font-size:12px;font-weight:700}h1{font-size:clamp(38px,6vw,78px);line-height:.95;margin:14px 0 16px}.subtitle{max-width:760px;color:var(--muted);font-size:17px;line-height:1.7}.stats{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}.stat{background:rgba(255,250,242,.72);border:1px solid var(--line);padding:13px 16px;border-radius:20px}.stat b{display:block;font-size:22px}.stat span{color:var(--muted);font-size:12px}.toolbar{position:sticky;top:0;z-index:5;backdrop-filter:blur(18px);background:rgba(244,239,231,.78);border-block:1px solid var(--line)}.toolbar-inner{max-width:1220px;margin:auto;padding:16px 24px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.filters{display:flex;gap:9px;flex-wrap:wrap}.filter{border:1px solid var(--line);background:var(--paper);color:var(--ink);padding:10px 14px;border-radius:999px;cursor:pointer;transition:.22s ease;font-weight:650}.filter:hover,.filter.active{background:var(--ink);color:#fff}.search{border:1px solid var(--line);border-radius:999px;padding:11px 15px;background:var(--paper);outline:none}main{max-width:1220px;margin:auto;padding:28px 24px 70px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{grid-column:span 4;position:relative;border-radius:26px;overflow:hidden;background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;min-height:340px;transition:.28s ease}.card.large{grid-column:span 6}.card:hover{transform:translateY(-4px)}.card img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}.card:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(20,16,13,.76))}.meta{position:absolute;left:18px;right:18px;bottom:17px;z-index:2;color:#fff}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,250,242,.18);border:1px solid rgba(255,255,255,.32);font-size:12px;font-weight:700;margin-bottom:9px}.meta h2{margin:0 0 5px;font-size:20px}.meta p{margin:0;color:rgba(255,255,255,.78);font-size:13px;line-height:1.45}.empty{display:none;text-align:center;padding:70px 20px;color:var(--muted)}.lightbox{position:fixed;inset:0;background:rgba(18,14,12,.88);z-index:20;display:none;align-items:center;justify-content:center;padding:26px}.lightbox.open{display:flex}.lightbox-card{width:min(1180px,100%);max-height:92vh;background:#15110e;border-radius:26px;overflow:hidden;display:grid;grid-template-columns:1fr 310px}.lightbox img{width:100%;height:92vh;object-fit:contain;background:#0d0b09}.panel{padding:24px;color:#fff}.room{color:#dbc5aa;font-weight:800;text-transform:uppercase;letter-spacing:.13em;font-size:12px}.panel h3{font-size:28px;margin:10px 0}.panel p{color:#d6c9bb;line-height:1.65}.close,.nav{border:0;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;border-radius:999px}.close{position:absolute;top:18px;right:18px;width:44px;height:44px;font-size:26px}.nav{padding:12px 16px;margin-right:10px}.footer{text-align:center;color:var(--muted);padding:18px;font-size:13px}@media(max-width:900px){.card,.card.large{grid-column:span 6}.lightbox-card{grid-template-columns:1fr;overflow:auto}.lightbox img{height:auto;max-height:70vh}}@media(max-width:620px){.card,.card.large{grid-column:span 12;min-height:300px}.search{width:100%}}
</style></head><body><section class="hero"><div class="kicker">Warm Minimalist HDB Interior Gallery</div><h1>Ben & Luo's Home</h1><p class="subtitle">A curated visual archive of the home design renders, organised by room and mood — warm neutrals, soft lighting, wood accents and clean built-ins.</p><div class="stats" id="stats"></div></section><section class="toolbar"><div class="toolbar-inner"><div class="filters" id="filters"></div><input class="search" id="search" placeholder="Search rooms or details..."></div></section><main><div class="grid" id="gallery"></div><div class="empty" id="empty">No renders found for this filter.</div></main><div class="lightbox" id="lightbox"><button class="close" onclick="closeLightbox()">×</button><div class="lightbox-card"><img id="lightboxImg"><aside class="panel"><div class="room" id="lightboxRoom"></div><h3 id="lightboxTitle"></h3><p id="lightboxDesc"></p><button class="nav" onclick="prevImage()">← Previous</button><button class="nav" onclick="nextImage()">Next →</button></aside></div></div><div class="footer">Built as an interactive gallery for Ben & Luo's Home.</div><script>
const items=[{"room": "Kitchen", "title": "Wet Kitchen Front", "desc": "Full-height warm taupe cabinetry, marble backsplash and integrated black appliances.", "src": "0E57592C-1950-4D7F-B3E8-23FD57CCC69A.PNG"}, {"room": "Service Yard", "title": "Service Yard & Kitchen", "desc": "Laundry zone connected visually to the wet kitchen through glass doors.", "src": "6ABFC0AC-85E8-48A4-B421-C7836FF747C6.PNG"}, {"room": "Dining", "title": "Dry Pantry View", "desc": "Marble counter, ribbed feature column and warm pendant lighting.", "src": "6E6C28CE-1746-4890-BCF7-F9B4EE616890.PNG"}, {"room": "Dining", "title": "Island & Dining Approach", "desc": "Central island axis with pendant lighting and display shelving.", "src": "7A5CA484-4605-4FF2-AA6B-98C47766D5DB.PNG"}, {"room": "Master Bedroom", "title": "Master Bedroom Entry", "desc": "Wardrobe wall, vanity corner and shoji-inspired bedroom door.", "src": "9BA00B31-E036-4606-8C50-83B418D9B116.PNG"}, {"room": "Toilets", "title": "Bathroom Concept", "desc": "Warm stone tiles, black fittings, floating vanity and backlit mirror.", "src": "201CCEA1-5F23-4A52-9468-C2FF34DD50D8.PNG"}, {"room": "Dining", "title": "Dining to Kitchen", "desc": "Dining table aligned with kitchen backdrop and dry pantry column.", "src": "639AB6F3-23E7-407B-92A4-AA0127B97118.PNG"}, {"room": "Master Bedroom", "title": "Master Bedroom Full View", "desc": "Layered headboard lighting, soft textiles and full-height wardrobes.", "src": "24989CA2-794A-485C-94CC-FE23550602A5.PNG"}, {"room": "Dining", "title": "Shoji Door Dining View", "desc": "Shoji-style door beside the dining area with warm Japandi tones.", "src": "126066E4-DF4B-40BE-8673-4FF5A24E1281.PNG"}, {"room": "Living", "title": "Dry Pantry to Living", "desc": "Dry pantry with drinks fridge opening towards the living room.", "src": "03111040-F3B0-4840-8DC3-4937037FBB5B.PNG"}, {"room": "Service Yard", "title": "Service Yard Storage", "desc": "Utility cabinetry and window-side counter near the kitchen threshold.", "src": "A3D73CFB-2990-48B9-B25F-74067CFED2E0.PNG"}, {"room": "Living", "title": "Living Room Lounge", "desc": "TV wall, lounge chair, soft roman blinds and warm built-in shelving.", "src": "BC920001-0F60-47E4-9EC3-A386EA05012A.PNG"}, {"room": "Living", "title": "Living Storage Wall", "desc": "Full-height storage with lit display niches framing the living area.", "src": "BED1E548-882C-495C-8948-789D385C7731.PNG"}, {"room": "Living", "title": "Living / Dining Split View", "desc": "Split perspective showing the continuity from living to dining.", "src": "C4420A1D-D459-4D1F-8D28-FB0CF9B8320F.PNG"}, {"room": "Living", "title": "Living Room Main View", "desc": "Warm lounge layout with TV wall, ceiling fan and layered lighting.", "src": "D1016C24-C02A-4230-BD55-3ACD61D35F20.PNG"}, {"room": "Dining", "title": "Dining & Kitchen Front", "desc": "Dining table, island and kitchen composition from the main axis.", "src": "DA654D2E-952C-4AE9-A7E8-8E071CFE3E14.PNG"}, {"room": "Toilets", "title": "Common Bathroom View", "desc": "Glass shower partition, wall-hung WC and floating timber vanity.", "src": "EBF09E6E-B34B-4FCD-BC77-64D0D27AEB55.PNG"}];
const rooms=["All", "Living", "Kitchen", "Dining", "Service Yard", "Toilets", "Master Bedroom"];
const counts={"All": 17, "Living": 5, "Kitchen": 1, "Dining": 5, "Service Yard": 2, "Toilets": 2, "Master Bedroom": 2};
let activeRoom='All',query='',visibleItems=[...items],currentIndex=0;
function init(){
 stats.innerHTML=`<div class="stat"><b>${counts.All}</b><span>Total renders</span></div><div class="stat"><b>6</b><span>Room zones</span></div><div class="stat"><b>Warm Minimalist</b><span>Design mood</span></div>`;
 filters.innerHTML=rooms.map(r=>`<button class="filter ${r==='All'?'active':''}" data-room="${r}">${r} <span style="opacity:.62">${counts[r]}</span></button>`).join('');
 document.querySelectorAll('.filter').forEach(btn=>btn.addEventListener('click',()=>{activeRoom=btn.dataset.room;document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}));
 search.addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
 render();
}
function render(){
 const order = ["Living","Dining","Kitchen","Service Yard","Toilets","Master Bedroom"];

 visibleItems = items.filter(item =>
   (activeRoom==='All'||item.room===activeRoom) &&
   (`${item.room} ${item.title} ${item.desc}`.toLowerCase().includes(query))
 );

 if(activeRoom==='All'){
   visibleItems.sort((a,b)=>order.indexOf(a.room)-order.indexOf(b.room));
 }

 gallery.innerHTML = visibleItems.map((item,idx)=>`
 <article class="card ${idx%7===0||idx%7===3?'large':''}" onclick="openLightbox(${idx})">
   <img loading="lazy" src="${item.src}" alt="${item.title}">
   <div class="meta">
     <div class="badge">${item.room}</div>
     <h2>${item.title}</h2>
     <p>${item.desc}</p>
   </div>
 </article>
 `).join('');

 empty.style.display = visibleItems.length ? 'none' : 'block';
}
function openLightbox(idx){currentIndex=idx;updateLightbox();lightbox.classList.add('open');}
function closeLightbox(){lightbox.classList.remove('open');}
function updateLightbox(){const item=visibleItems[currentIndex];if(!item)return;lightboxImg.src=item.src;lightboxRoom.textContent=item.room;lightboxTitle.textContent=item.title;lightboxDesc.textContent=item.desc;}
function nextImage(){currentIndex=(currentIndex+1)%visibleItems.length;updateLightbox();}
function prevImage(){currentIndex=(currentIndex-1+visibleItems.length)%visibleItems.length;updateLightbox();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();if(lightbox.classList.contains('open')&&e.key==='ArrowRight')nextImage();if(lightbox.classList.contains('open')&&e.key==='ArrowLeft')prevImage();});
lightbox.addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox();});
init();
</script></body></html>
